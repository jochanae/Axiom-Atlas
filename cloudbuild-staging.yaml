steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      ["build", "-t", "gcr.io/$PROJECT_ID/axiom-atlas:staging-$COMMIT_SHA", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/axiom-atlas:staging-$COMMIT_SHA"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "axiom-atlas"
      - "--image"
      - "gcr.io/$PROJECT_ID/axiom-atlas:staging-$COMMIT_SHA"
      - "--region"
      - "us-east1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--timeout"
      - "300"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--max-instances"
      - "10"
      - "--no-traffic"
      - "--tag"
      - "staging"
    id: "deploy-staging"

images:
  - "gcr.io/$PROJECT_ID/axiom-atlas:staging-$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
