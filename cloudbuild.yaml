steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      ["build", "-t", "gcr.io/$PROJECT_ID/axiom-atlas:$COMMIT_SHA", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/axiom-atlas:$COMMIT_SHA"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "axiom-atlas"
      - "--image"
      - "gcr.io/$PROJECT_ID/axiom-atlas:$COMMIT_SHA"
      - "--region"
      - "us-east1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--timeout"
      - "300"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--max-instances"
      - "10"
      - "--no-traffic"
    id: "deploy-new-revision"

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "services"
      - "update-traffic"
      - "axiom-atlas"
      - "--region"
      - "us-east1"
      - "--to-latest"
      - "--platform"
      - "managed"
    id: "route-traffic"

  # Auto-migrate database schema on every deploy
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "run"
      - "--rm"
      - "gcr.io/$PROJECT_ID/axiom-atlas:$COMMIT_SHA"
      - "pnpm"
      - "--filter"
      - "@workspace/db"
      - "run"
      - "push"
    secretEnv: ["DATABASE_URL"]
    id: "migrate-db"
    waitFor:
      - "deploy-new-revision"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

images:
  - "gcr.io/$PROJECT_ID/axiom-atlas:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
